<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COG-NET // AUTH_REQUIRED :: [Ulica404]</title>
    <style>
        /* --- DESIGN SYSTEM: CYBER-MINIMALISM 2026 --- */
        :root {
            --bg-base: #010203;       /* Głęboki, "kosmiczny" czarny */
            --accent-main: #00f2fe;   /* Neonowy, "lodowy" błękit (twoja aura) */
            --accent-glow: rgba(0, 242, 254, 0.4);
            --interface-bg: rgba(5, 10, 20, 0.9); /* "Oszronione" szkło */
            --border: #0a1525;
            --text-primary: #fff;
            --text-secondary: #4a5d73;
            --font-mono: 'Fira Code', 'Courier New', monospace;
            --font-cyber: 'Syncopate', 'Segoe UI', sans-serif; /* Futurystyczny, szeroki font */
        }

        /* --- GLOBAL EFFECTS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Deklaracja HUD (Heads-Up Display) w rogach */
        .hud-corner {
            position: absolute;
            font-family: var(--font-cyber);
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        .hud-tl { top: 20px; left: 20px; text-shadow: 0 0 5px var(--accent-glow); }
        .hud-br { bottom: 20px; right: 20px; text-align: right; }

        /* --- BACKGROUND CANVAS (DYSKRETNY NETWORK) --- */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        /* --- MAIN CORE UNIT FRAME --- */
        .core-unit-frame {
            position: relative;
            z-index: 10;
            width: 80%;
            max-width: 900px;
            background: var(--interface-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(10px); /* Efekt "oszronionego szkła" */
            opacity: 0;
            animation: core-boot 1.5s ease-out 0.2s forwards;
            box-shadow: 
                0 0 10px var(--border),
                inset 0 0 20px rgba(0, 242, 254, 0.05);
        }

        /* --- VISUAL CORE (Neural Octagon) --- */
        .core-visual-container {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .neural-octagon {
            width: 100px;
            height: 100px;
            background: var(--bg-base);
            border: 2px solid var(--accent-main);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px var(--accent-glow);
            animation: octagon-pulse 3s infinite;
        }

        .ai-pulse-center {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 
                0 0 20px #fff,
                0 0 40px var(--accent-main);
            animation: core-light-pulse 1s infinite alternate;
        }

        /* --- CONTENT SECTION --- */
        .core-content {
            margin-top: 3rem;
            text-align: center;
        }

        h1.core-title {
            font-family: var(--font-cyber);
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .ai-model-tag {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--accent-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            display: inline-block;
            position: relative;
        }

        .ai-model-tag::before {
            content: "◆ ";
            animation: blink 0.5s infinite alternate;
        }

        .description {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 3rem;
        }

        /* --- TECH BUTTONS --- */
        .actions-block {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ai-btn {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            font-family: var(--font-mono);
            padding: 15px 40px;
            border-radius: 50px; /* Okrągłe, sterylne */
            background: transparent;
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .ai-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--accent-main);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .ai-btn:hover {
            border-color: var(--accent-main);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-3px);
            color: #000;
        }

        .ai-btn:hover::before {
            opacity: 1;
        }

        /* --- ANIMATIONS --- */
        @keyframes core-boot {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes octagon-pulse {
            0%, 100% { border-color: var(--accent-main); transform: scale(1); }
            50% { border-color: #fff; transform: scale(1.03); }
        }

        @keyframes core-light-pulse {
            from { opacity: 0.7; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        @keyframes blink { to { opacity: 0; } }

        /* Responsive */
        @media (max-width: 700px) {
            .core-unit-frame { width: 95%; padding: 1.5rem; border-radius: 10px; }
            h1.core-title { font-size: 1.8rem; letter-spacing: 2px; }
            .ai-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div class="hud-corner hud-tl">SYS://COG-NET // AUTH.REQUIRED</div>
    <div class="hud-corner hud-br">NODE://NC_LABS_01 // SEC.ACTIVE</div>

    <div class="core-unit-frame">
        
        <div class="core-visual-container">
            <div class="neural-octagon">
                <div class="ai-pulse-center"></div>
            </div>
        </div>

        <div class="core-content">
            <h1 class="core-title">> Ulica404</h1>
            <div class="ai-model-tag">Street-Level Neural Engineering</div>

            
            
            <div class="actions-block">
                <a href="https://github.com/Ulica404?tab=repositories" class="ai-btn">Initialize_Core_Load</a>
                <a href="mailto:mat.streetZ@gmail.com" class="ai-btn">Secure_Comms</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        class Particle {
            constructor(x, y, size, color, velocityX, velocityY) {
                this.x = x; this.y = y; this.size = size; this.color = color;
                this.velocityX = velocityX; this.velocityY = velocityY;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.velocityX = -this.velocityX;
                if (this.y > canvas.height || this.y < 0) this.velocityY = -this.velocityY;
                this.x += this.velocityX; this.y += this.velocityY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                // Bardziej stonowana, chłodna prędkość
                let velocityX = (Math.random() * 0.2) - 0.1;
                let velocityY = (Math.random() * 0.2) - 0.1;
                // Lodowy niebieski z różną przezroczystością
                let color = `rgba(0, 210, 255, ${Math.random() * 0.3})`; 

                particlesArray.push(new Particle(x, y, size, color, velocityX, velocityY));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            particlesArray.forEach(p => p.update());
        }

        initParticles(); animate();

        window.addEventListener('resize', () => {
            canvas.width = innerWidth; canvas.height = innerHeight; initParticles();
        });
    </script>
</body>
</html>
