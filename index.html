<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witaj na moim GitHubie</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .links {
            margin-top: 2rem;
        }

        .btn {
            text-decoration: none;
            color: var(--bg-color);
            background-color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .status {
            display: inline-block;
            margin-top: 1rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #238636;
            color: white;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status">Dostępny do projektów</div>
        <h1>Witaj na moim profilu!</h1>
        <p>
            Jestem pasjonatem technologii i programowania. 
            Tutaj znajdziesz moje najnowsze eksperymenty, narzędzia i projekty open-source.
        </p>
        
        <div class="links">
            <a href="https://github.com/TWOJA-NAZWA?tab=repositories" class="btn">Zobacz Repozytoria</a>
        </div>
    </div>

</body>
</html>
